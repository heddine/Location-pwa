<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quittance de Loyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-xl font-bold mb-4">Quittance de Loyer</h1>

<form id="formQuittance" class="space-y-4">

    <input class="w-full p-2 border rounded" name="locataire" placeholder="Nom du locataire">
    <input class="w-full p-2 border rounded" name="mois" placeholder="Mois (ex : Janvier)">
    <input class="w-full p-2 border rounded" name="montant" placeholder="Montant payé (€)" type="number">

    <button class="bg-blue-600 text-white px-4 py-2 rounded">Générer PDF</button>
</form>

<script src="./js/quittance.js"></script>

</body>
</html>
